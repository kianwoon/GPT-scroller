<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header img { width: 24px; height: 24px; }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }
    .label {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: #333;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #6c63ff;
      cursor: pointer;
      transition: background 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      background: #7f78ff;
    }
    .value-display {
      font-size: 18px;
      font-weight: 700;
      color: #6c63ff;
      min-width: 42px;
      text-align: right;
    }
    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #555;
      margin-bottom: 16px;
    }
    .hint {
      font-size: 11px;
      color: #555;
      text-align: center;
      padding-top: 8px;
      border-top: 1px solid #2a2a3e;
    }
    .reset-btn {
      display: block;
      margin: 0 auto 12px;
      padding: 4px 14px;
      font-size: 11px;
      color: #888;
      background: none;
      border: 1px solid #333;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .reset-btn:hover {
      color: #6c63ff;
      border-color: #6c63ff;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon-48.png" alt="ChatPin">
    <h1>ChatPin</h1>
  </div>

  <div class="label">Pin Height</div>
  <div class="slider-row">
    <input type="range" id="heightSlider" min="0" max="50" value="30" step="1">
    <span class="value-display" id="heightValue">30%</span>
  </div>
  <div class="range-labels">
    <span>Top</span>
    <span>Bottom</span>
  </div>

  <button class="reset-btn" id="resetBtn">Reset to Default</button>

  <div class="hint">Changes apply instantly on active chats</div>

  <script src="popup.js"></script>
</body>
</html>
